<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Federated IDS | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --primary: #00f0ff;
            --secondary: #7000ff;
            --success: #00ff88;
            --error: #ff3366;
            --surface: rgba(25, 30, 45, 0.6);
            --surface-hover: rgba(45, 55, 80, 0.8);
            --text-main: #ffffff;
            --text-muted: #8d9bbb;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(112, 0, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(0, 240, 255, 0.15) 0%, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 60px auto;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .glass-card {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .form-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        select {
            width: 100%;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            appearance: none;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus {
            border-color: var(--primary);
        }

        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(0, 240, 255, 0.05);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        #file-input {
            opacity: 0;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-name {
            display: block;
            margin-top: 15px;
            color: var(--primary);
            font-weight: 600;
        }

        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(112, 0, 255, 0.4);
        }

        .btn:disabled {
            filter: grayscale(1);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #loader {
            display: none;
            margin-top: 30px;
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }

        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }

        /* Results Area */
        #results {
            display: none;
            margin-top: 40px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .correct { color: var(--success); }
        .wrong { color: var(--error); }
        .acc { color: var(--primary); }

        .error-msg {
            color: var(--error);
            text-align: center;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Intrusion Detection</h1>
            <p class="subtitle">Federated Edge Evaluation Console</p>
        </header>

        <div class="glass-card">
            <form id="predict-form">
                <div class="form-group">
                    <label>Target Detection Model</label>
                    <select id="model-select" required>
                        <option value="" disabled selected>System verifying available models...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Network Traffic Data (CSV)</label>
                    <div class="upload-area" id="upload-area">
                        <span class="upload-icon">📊</span>
                        <span>Drag & Drop your CIC-IDS 2018 CSV file here</span>
                        <br><span style="font-size: 0.9em; color: var(--text-muted);">or click to browse local traffic</span>
                        <input type="file" id="file-input" accept=".csv" required>
                        <span class="file-name" id="file-name"></span>
                    </div>
                </div>

                <button type="submit" class="btn" id="submit-btn">Run Distributed Analysis</button>
            </form>

            <div id="loader">
                <div class="spinner"></div>
                <div style="color: var(--primary);">Analyzing traffic patterns across edge weights...</div>
            </div>

            <div class="error-msg" id="error-msg"></div>

            <div id="results">
                <h3 style="text-align: center; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px;">Evaluation Matrix</h3>
                <div style="text-align: center; color: var(--text-muted); font-size:0.85rem; margin-bottom: 25px;">Total Frames Analyzed: <span id="res-total" style="color:white; font-weight:bold;">0</span></div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value correct" id="res-correct">0</div>
                        <div class="stat-label">Correct Predictions</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value wrong" id="res-wrong">0</div>
                        <div class="stat-label">False Predictions</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value acc" id="res-acc">0%</div>
                        <div class="stat-label">Detection Accuracy</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Definitions
        const modelSelect = document.getElementById('model-select');
        const fileInput = document.getElementById('file-input');
        const fileName = document.getElementById('file-name');
        const form = document.getElementById('predict-form');
        const btn = document.getElementById('submit-btn');
        const loader = document.getElementById('loader');
        const results = document.getElementById('results');
        const errMsg = document.getElementById('error-msg');

        // Dynamically fetch PyTorch .pth models from backend memory
        fetch('/api/models')
            .then(res => res.json())
            .then(data => {
                modelSelect.innerHTML = '';
                if(data.models && data.models.length > 0) {
                    data.models.forEach(m => {
                        const opt = document.createElement('option');
                        opt.value = m;
                        opt.textContent = m;
                        modelSelect.appendChild(opt);
                    });
                } else {
                    modelSelect.innerHTML = '<option disabled selected>No models exported. Run run_experiments.py first!</option>';
                }
            })
            .catch(err => {
                modelSelect.innerHTML = '<option disabled selected>Error establishing server handshake</option>';
            });

        // Visually bind file picker changes
        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length > 0) {
                fileName.textContent = "Selected: " + e.target.files[0].name;
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const file = fileInput.files[0];
            const model = modelSelect.value;
            
            if(!file || !model) return;

            const formData = new FormData();
            formData.append('file', file);
            formData.append('model', model);

            // Execute UI Loading State
            btn.disabled = true;
            loader.style.display = 'block';
            results.style.display = 'none';
            errMsg.style.display = 'none';

            try {
                // Post network traffic matrix to local API for Torch evaluation
                const response = await fetch('/api/predict', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if(response.ok) {
                    // Drive fluid animations on resulting UI block
                    document.getElementById('res-total').textContent = data.total.toLocaleString();
                    animateValue("res-correct", 0, data.correct, 1200);
                    animateValue("res-wrong", 0, data.wrong, 1200);
                    document.getElementById('res-acc').textContent = data.accuracy + '%';
                    results.style.display = 'block';
                } else {
                    errMsg.textContent = data.error || 'Pipeline breakdown detected during inference';
                    errMsg.style.display = 'block';
                }
            } catch (err) {
                errMsg.textContent = 'REST API node is unreachable. Is app.py running?';
                errMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        });

        // Increment ticker generator function (Smooth UX rendering)
        function animateValue(id, start, end, duration) {
            const obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start).toLocaleString();
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }
    </script>
</body>
</html>
